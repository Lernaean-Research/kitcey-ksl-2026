name: Bug report
description: Report an error in scripts, outputs, or reproducibility workflow.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide enough detail to reproduce the issue.

  - type: input
    id: script
    attributes:
      label: Script or file
      description: Which script or file is affected?
      placeholder: code/toy_model/bounded_instantiation.py
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Exact command that triggered the issue.
      placeholder: python code/toy_model/bounded_instantiation.py
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened instead? Include error text.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, Python version, and package environment.
      placeholder: Windows 11, Python 3.13, environment.yml
