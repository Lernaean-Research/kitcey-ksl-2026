name: Reproducibility Smoke Test

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bounded instantiation
        run: python code/toy_model/bounded_instantiation.py

      - name: Verify expected artifacts
        run: |
          test -f outputs/json/bounded_instantiation_summary.json
          test -f outputs/csv/bounded_instantiation_sweep.csv
